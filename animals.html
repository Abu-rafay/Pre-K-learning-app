<main>
  <section class="page-banner green-bg">
    <div class="container center-text">
      <p class="eyebrow">Animals Lesson</p>
      <h1>Meet our animal friends</h1>
      <p>Click an animal card to learn its name.</p>
    </div>
  </section>
  <section class="container section">
    <div class="grid cards-4">
      <button class="card animal-card" data-title="Lion" data-text="The lion is a big wild cat."><span class="animal-emoji">🦁</span><h3>Lion</h3></button>
      <button class="card animal-card" data-title="Elephant" data-text="The elephant has a long trunk."><span class="animal-emoji">🐘</span><h3>Elephant</h3></button>
      <button class="card animal-card" data-title="Dog" data-text="A dog can bark and play."><span class="animal-emoji">🐶</span><h3>Dog</h3></button>
      <button class="card animal-card" data-title="Cat" data-text="A cat can meow and jump."><span class="animal-emoji">🐱</span><h3>Cat</h3></button>
      <button class="card animal-card" data-title="Monkey" data-text="A monkey likes climbing trees."><span class="animal-emoji">🐵</span><h3>Monkey</h3></button>
      <button class="card animal-card" data-title="Rabbit" data-text="A rabbit has long ears."><span class="animal-emoji">🐰</span><h3>Rabbit</h3></button>
      <button class="card animal-card" data-title="Fish" data-text="A fish swims in water."><span class="animal-emoji">🐟</span><h3>Fish</h3></button>
      <button class="card animal-card" data-title="Bird" data-text="A bird can fly in the sky."><span class="animal-emoji">🐦</span><h3>Bird</h3></button>
    </div>
  </section>
