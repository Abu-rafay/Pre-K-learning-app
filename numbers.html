<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<body>
<header class="site-header"><div class="container nav-wrap"><a href="index.html" class="logo">Little Learners World</a><button class="menu-toggle" aria-label="Open menu">☰</button><nav class="site-nav"><a href="index.html">Home</a><a href="learning.html">Learning Hub</a><a href="colors.html">Colors</a><a href="numbers.html">Numbers</a><a href="animals.html">Animals</a><a href="shapes.html">Shapes</a><a href="schedule.html">Schedule</a><a href="games.html">Games</a></nav></div></header>
<main>
  <section class="page-banner blue-bg">
    <div class="container center-text">
      <p class="eyebrow">Numbers Lesson</p>
      <h1>Let’s count from 1 to 10</h1>
      <p>Click a number and count the stars.</p>
    </div>
  </section>
  <section class="container section">
    <div class="grid cards-5 number-grid">
      <button class="number-card" data-title="1" data-text="⭐">1</button>
      <button class="number-card" data-title="2" data-text="⭐⭐">2</button>
      <button class="number-card" data-title="3" data-text="⭐⭐⭐">3</button>
      <button class="number-card" data-title="4" data-text="⭐⭐⭐⭐">4</button>
      <button class="number-card" data-title="5" data-text="⭐⭐⭐⭐⭐">5</button>
      <button class="number-card" data-title="6" data-text="⭐⭐⭐⭐⭐⭐">6</button>
      <button class="number-card" data-title="7" data-text="⭐⭐⭐⭐⭐⭐⭐">7</button>
      <button class="number-card" data-title="8" data-text="⭐⭐⭐⭐⭐⭐⭐⭐">8</button>
      <button class="number-card" data-title="9" data-text="⭐⭐⭐⭐⭐⭐⭐⭐⭐">9</button>
      <button class="number-card" data-title="10" data-text="⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐">10</button>
    </div>
  </section>
</main>
<div class="modal" id="infoModal"><div class="modal-content"><button class="close-modal" aria-label="Close modal">×</button><h2 class="modal-title"></h2><p class="modal-text big-stars"></p></div></div>

<footer class="site-footer"><div class="container"><p>Counting is fun!</p></div></footer>
